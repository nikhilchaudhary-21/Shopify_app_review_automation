name: Loop Reviews Scraper

on:
  # ── Automatic schedule ──────────────────────────
  schedule:
    - cron: "0 * * * *"   # every 1 hour → update mode

  # ── Manual trigger from GitHub UI ───────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "update"
        type: choice
        options:
          - update   # only checks pages 1-3 per rating (fast, for new reviews)
          - full     # scrapes ALL pages of ALL ratings (slow, use once)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SHEET_ID:                 ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          WORKSHEET_NAME:           ${{ secrets.WORKSHEET_NAME }}
          # scheduled runs = update, manual can override
          RUN_MODE: ${{ github.event.inputs.mode || 'update' }}
        run: python scraper.py
